<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Akun | KyLib</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<a href="index.html" class="back-home">← Kembali ke Beranda</a>

<div class="auth-container">
    <h2>Daftar Akun KyLib</h2>

    <form onsubmit="registerUser(event)">
        <input type="text" placeholder="Nama Lengkap" required>
        <input type="text" placeholder="Username" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Nomor Telepon" required>
        <input type="password" placeholder="Password" required>
        <input type="password" placeholder="Konfirmasi Password" required>

        <button type="submit">Daftar Sekarang</button>
    </form>

    <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
</div>

<script>
document.querySelector("form").addEventListener("submit", function(e){
    e.preventDefault();

    const nama = document.querySelector("input[placeholder='Nama Lengkap']").value;
    const username = document.querySelector("input[placeholder='Username']").value;
    const email = document.querySelector("input[type='email']").value;
    const password = document.querySelector("input[placeholder='Password']").value;
    const konfirmasi = document.querySelector("input[placeholder='Konfirmasi Password']").value;

    if(password !== konfirmasi){
        alert("Password tidak sama!");
        return;
    }

    const userData = {
        nama: nama,
        username: username,
        email: email,
        password: password
    };

    localStorage.setItem("userData", JSON.stringify(userData));

    alert("Pendaftaran berhasil! Silakan login.");
    window.location.href = "login.html";
});
</script>
</body>
</html>
