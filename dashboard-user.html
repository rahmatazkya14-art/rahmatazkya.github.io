<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | KyLib</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        .dashboard-layout{
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:240px;
            background:#1f2a44;
            color:white;
            padding:30px 20px;
        }

        .sidebar h2{
            color:#6fa4ff;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            padding:12px;
            border-radius:8px;
            margin-bottom:10px;
            transition:.3s;
            font-size:14px;
        }

        .sidebar a:hover{
            background:#2d4de0;
        }

        .dashboard-main{
            flex:1;
            padding:40px;
            background:#f5f7fb;
        }

        .greeting{
            font-size:22px;
            margin-bottom:25px;
            font-weight:600;
        }

        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
            margin-bottom:40px;
        }

        .stat-card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
            text-align:center;
        }

        .stat-card i{
            font-size:28px;
            color:#2d4de0;
            margin-bottom:10px;
        }

        .progress-box{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
            margin-bottom:40px;
        }

        .progress-bar{
            background:#e0e6ed;
            height:20px;
            border-radius:10px;
            overflow:hidden;
            margin-top:10px;
        }

        .progress-fill{
            height:100%;
            width:1%;
            background:#2d4de0;
        }

        .favorite-section{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        .favorite-item{
            padding:10px 0;
            border-bottom:1px solid #eee;
            font-size:14px;
        }

        .logout-btn{
            margin-top:30px;
            background:#2d4de0;
            padding:10px;
            border-radius:8px;
            text-align:center;
            cursor:pointer;
        }

        .logout-btn:hover{
            background:#6fa4ff;
        }
    </style>
</head>
<body>

<div class="dashboard-layout">

    <div class="sidebar">
        <h2>KyLib</h2>
        <a href="index.html"><i class="fa-solid fa-house"></i> Beranda</a>
        <a href="koleksi.html"><i class="fa-solid fa-book"></i> Koleksi</a>
        <a href="#"><i class="fa-solid fa-newspaper"></i> Artikel Ilmu</a>
        <a href="#"><i class="fa-solid fa-video"></i> Video Lab</a>
        <a href="#"><i class="fa-solid fa-heart"></i> Favorit</a>
        <div class="logout-btn" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </div>
    </div>

    <div class="dashboard-main">

        <div class="greeting">
            Halo, <span id="userNameDisplay"></span> 👋  
            Siap belajar hari ini?
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-book-open"></i>
                <h3>0</h3>
                <p>Materi Dibaca</p>
            </div>

            <div class="stat-card">
                <i class="fa-solid fa-video"></i>
                <h3>0</h3>
                <p>Video Ditonton</p>
            </div>

            <div class="stat-card">
                <i class="fa-solid fa-star"></i>
                <h3>0</h3>
                <p>Favorit</p>
            </div>
        </div>

        <div class="progress-box">
            <h3>Target Belajar Mingguan</h3>
            <p>Progress kamu minggu ini</p>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="favorite-section">
            <h3>Materi Favorit Kamu</h3>
            <div id="favoriteList">
                <div class="favorite-item">Belum ada favorit ditambahkan</div>
            </div>
        </div>

    </div>

</div>

<script>
const userData = JSON.parse(localStorage.getItem("userLogin"));

if(!userData){
    window.location.href = "login.html";
}else{
    document.getElementById("userNameDisplay").textContent = userData.nama;
}

document.getElementById("logoutBtn").addEventListener("click", function(){
    localStorage.removeItem("userLogin");
    window.location.href = "index.html";
});
</script>

</body>
</html>
